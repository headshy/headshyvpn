workflows:
  ios-release:
    name: iOS Release Workflow
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install glob  # Принудительная установка недостающего модуля
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Build and Export IPA
        script: |
          cd ios
          pod install
          # Собираем приложение
          xcodebuild build -workspace HeadshyVPN.xcworkspace -scheme HeadshyVPN -configuration Release -destination 'generic/platform=iOS' -archivePath HeadshyVPN.xcarchive archive
          # Экспортируем архив в IPA
          xcodebuild -exportArchive -archivePath HeadshyVPN.xcarchive -exportOptionsPlist exportOptions.plist -exportPath .
    artifacts:
      - ios/*.ipa
