workflows:
  ios-release:
    name: iOS Release Workflow
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install glob
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Build and Export IPA
        script: |
          cd ios
          pod install
          
          # 1. Запускаем сборку и просим Xcode выдать нам путь к результату
          xcodebuild build -workspace HeadshyVPN.xcworkspace \
                           -scheme HeadshyVPN \
                           -configuration Release \
                           -destination 'generic/platform=iOS' \
                           CODE_SIGNING_REQUIRED=NO \
                           CODE_SIGNING_ALLOWED=NO \
                           SYMROOT=$(pwd)/build
          
          # 2. Ищем файл .app где угодно внутри папки build
          APP_PATH=$(find $(pwd)/build -name "*.app" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Ошибка: Файл .app не найден!"
            exit 1
          fi
          
          # 3. Упаковываем найденный файл в IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r HeadshyVPN.ipa Payload
    artifacts:
      - ios/*.ipa
