workflows:
  ios-debug-build:
    name: iOS Expo Debug IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Generate iOS native folder (Expo Prebuild)
        script: |
          npx expo prebuild --platform ios
      - name: Build iOS Debug Application
        script: |
          # Мы жестко указали схему HeadshyVPN, чтобы избежать ошибок автоматического поиска
          xcodebuild -workspace ios/HeadshyVPN.xcworkspace \
            -scheme "HeadshyVPN" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=$HOME/build
      - name: Package to IPA
        script: |
          mkdir -p $HOME/Payload
          cp -r $HOME/build/Debug-iphoneos/*.app $HOME/Payload/
          cd $HOME
          # Называем выходной файл понятным именем
          zip -r HeadshyVPN_Debug.ipa Payload
    artifacts:
      - $HOME/HeadshyVPN_Debug.ipa
