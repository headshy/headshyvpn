workflows:
  ios-release:
    name: iOS Release Workflow
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install glob  # Принудительная установка недостающего модуля
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Build iOS
        script: |
          cd ios
          pod install
          xcodebuild -workspace HeadshyVPN.xcworkspace \
            -scheme HeadshyVPN \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            archive -archivePath HeadshyVPN.xcarchive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/*.xcarchive
