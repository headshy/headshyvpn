workflows:
  ios-release-build:
    name: iOS Expo Release IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      
      - name: Generate iOS native folder (Expo Prebuild)
        script: |
          npx expo prebuild --platform ios
      
      - name: Build iOS Release Application
        script: |
          # Жестко указываем схему HeadshyVPN и собираем в Production (Release)
          xcodebuild -workspace ios/HeadshyVPN.xcworkspace \
            -scheme "HeadshyVPN" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=$HOME/build
      
      - name: Package to IPA
        script: |
          mkdir -p $HOME/Payload
          # Берем готовый .app из папки Release-iphoneos
          cp -r $HOME/build/Release-iphoneos/*.app $HOME/Payload/
          cd $HOME
          # Упаковываем в финальный релизный файл
          zip -r HeadshyVPN_Release.ipa Payload
          
    artifacts:
      - $HOME/HeadshyVPN_Release.ipa
