workflows:
  ios-debug-build:
    name: iOS Expo Debug IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Generate iOS native folder (Expo Prebuild)
        script: |
          # Этот шаг создаст папку ios и установит CocoaPods автоматически
          npx expo prebuild --platform ios
      - name: Build iOS Debug Application
        script: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme $(xcodebuild -list -workspace ios/*.xcworkspace | grep -m 1 -E "^\s+\S+" | awk '{print $1}') \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=$HOME/build
      - name: Package to IPA
        script: |
          mkdir -p $HOME/Payload
          cp -r $HOME/build/Debug-iphoneos/*.app $HOME/Payload/
          cd $HOME
          zip -r ios_debug_application.ipa Payload
    artifacts:
      - $HOME/ios-debug-build.ipa
