workflows:
  ios-release:
    name: iOS Release Workflow
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install glob
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Build and Export IPA
        script: |
          cd ios
          pod install
          # Собираем билд с отключением всех требований к подписи
          xcodebuild build -workspace HeadshyVPN.xcworkspace \
                           -scheme HeadshyVPN \
                           -configuration Release \
                           -destination 'generic/platform=iOS' \
                           CODE_SIGN_IDENTITY="" \
                           CODE_SIGNING_REQUIRED=NO \
                           CODE_SIGNING_ALLOWED=NO
          
          # Упаковываем в IPA вручную через структуру папок (без archive)
          mkdir -p Payload
          cp -r build/Release-iphoneos/HeadshyVPN.app Payload/
          zip -r HeadshyVPN.ipa Payload
    artifacts:
      - ios/*.ipa
